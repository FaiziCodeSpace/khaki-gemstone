  <!-- Store Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "Khaki Gemstone",
    "url": "https://khakigemstone.com/",
    "logo": "https://khakigemstone.com/Logos/logo.png",
    "image": "https://khakigemstone.com/Logos/logo.png",
    "description": "Premium supplier of natural certified gemstones including sapphire, ruby, emerald and rough gemstones.",

    "priceRange": "$$",
    "currenciesAccepted": "PKR, USD, GBP",
    "paymentAccepted": "Bank Transfer, Credit Card",

    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Ground Floor, Gulshan Cash and Carry",
      "addressLocality": "Dera Ismail Khan",
      "addressRegion": "Khyber Pakhtunkhwa",
      "postalCode": "29050",
      "addressCountry": "PK"
    },

    "geo": {
      "@type": "GeoCoordinates",
      "latitude": "31.8314",
      "longitude": "70.9019"
    },

    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": [
        "Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"
      ],
      "opens": "09:00",
      "closes": "21:00"
    },

    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "areaServed": "Worldwide",
      "availableLanguage": ["English"]
    },

    "sameAs": [
      "https://www.facebook.com/share/18JyNvqmF8/",
      "https://www.instagram.com/khaki_gemstone_com"
    ]
  }
  </script>

  <!-- ✅ Fallback Product Schema -->
  <script type="application/ld+json" id="fallback-product-schema">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Natural Gemstone",
    "description": "Certified natural gemstones including sapphire, ruby, emerald and rare stones.",
    "brand": {
      "@type": "Brand",
      "name": "Khaki Gemstone"
    },
    "offers": {
      "@type": "Offer",
      "priceCurrency": "PKR",
      "availability": "https://schema.org/InStock",
      "url": "https://khakigemstone.com/",
      "shippingDetails": {
        "@type": "OfferShippingDetails",
        "shippingDestination": {
          "@type": "DefinedRegion",
          "addressCountry": "PK"
        }
      },
      "hasMerchantReturnPolicy": {
        "@type": "MerchantReturnPolicy",
        "returnPolicyCategory": "https://schema.org/MerchantReturnFiniteReturnWindow",
        "merchantReturnDays": 7,
        "returnMethod": "https://schema.org/ReturnInStore",
        "returnFees": "https://schema.org/FreeReturn"
      }
    }
  }
  </script>
  <!-- Auto-inject priceValidUntil = 1 year from today, so it never expires manually -->
  <script>
    (function () {
      try {
        var el = document.getElementById('fallback-product-schema');
        var schema = JSON.parse(el.textContent);
        var d = new Date();
        d.setFullYear(d.getFullYear() + 1);
        schema.offers.priceValidUntil = d.toISOString().split('T')[0];
        el.textContent = JSON.stringify(schema);
      } catch (e) {}
    })();
  </script>

</head>

<body>
  <div id="root"></div>

</body>
